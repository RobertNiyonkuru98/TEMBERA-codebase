          name: id
          schema:
            type: string
          required: true
      responses:
        "204":
          description: Booking deleted
        "404":
          description: Booking not found

  /booking-items:
    get:
      summary: Retrieve a list of booking items
      responses:
        "200":
          description: A list of booking items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingItem"
    post:
      summary: Create a new booking item
      requestBody:
        required: true
