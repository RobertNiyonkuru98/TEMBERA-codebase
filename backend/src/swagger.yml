components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        phone_number:
          type: string
        password:
          type: string
    Company:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        contact:
          type: string
        owner_id:
          type: string
    Itinerary:
      type: object
      properties:
        id:
          type: string
        company_id:
          type: string
        title:
          type: string
        activity:
          type: string
        description:
          type: string
        location:
          type: string
        date:
          type: string
          format: date
        price:
          type: number
    Booking:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        description:
          type: string
        status:
          type: string
        date:
          type: string
          format: date
    BookingItem:
      type: object
      properties:
        id:
          type: string
        itinerary_id:
          type: string
        booking_id:
          type: string
